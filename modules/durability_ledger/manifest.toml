version = "0.1.0"
hardware_targets = ["bcm2712"]

[params]
self_id = { type = "u8", default = 0, doc = "This node's replica slot" }
voter_count = { type = "u8", default = 1, doc = "Total voters in cluster" }

[[ports]]
name = "ack_in"
direction = "input"
content_type = "OctetStream"

[[ports]]
name = "quorum_durable"
direction = "output"
content_type = "OctetStream"
