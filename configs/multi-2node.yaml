# Clustor — 2-replica single-partition test cluster (template).
#
# This file is a TEMPLATE: it contains `__SELF_ID__` and
# `__LISTEN_PORT__` placeholders that must be substituted per node
# before `fluxor run`. Render with:
#
#   fluxor up configs/multi-2node.yaml --replicas 2          # spawn both
#   fluxor render-template configs/multi-2node.yaml \
#       --var SELF_ID=0 --var LISTEN_PORT=9090 \
#       --var PEER0_PORT=9090 --var PEER1_PORT=9091 \
#       --var HTTP_PORT=19090 > /tmp/n0.yaml                  # one node
#
# Both replicas run on localhost. node 0 listens on 9090, node 1 on
# 9091. voter_count=2 means majority=2, so both nodes must agree to
# commit a proposal and to elect a leader; with either down, no
# progress is possible — that's the safety property the topology
# exists to verify.
#
# Validates peer connections, peer_router demux (peer_rx fans out to
# BOTH replicator and raft_engine), AppendEntries replication, and
# durability quorum across two replicas. Run from per-node working
# directories so `wal/` and `raft/` don't collide.

target: linux
tick_us: 1000

# Accept structural cycles. The clustor graph has a metrics fanout
# `raft_engine → telemetry_agg → client_surface → raft_engine.rpc`
# which is a topological cycle but a semantic feedback edge — each
# step is single-pass and never re-enters the cycle within one tick.
# Without this the scheduler rejects the graph; see fluxor's
# `prepare_graph` and `scheduler.accept_cycles`.
scheduler:
  accept_cycles: true

platform:
  net: {}

modules:
  - name: peer_router
    params:
      self_id: __SELF_ID__
      peer_count: 2
      listen_port: __LISTEN_PORT__
      peer0_port: __PEER0_PORT__
      peer1_port: __PEER1_PORT__

  - name: raft_engine
    params:
      self_id: __SELF_ID__
      voter_count: 2
      heartbeat_interval_ms: 150

  - name: replicator
    params:
      self_id: __SELF_ID__
      peer_count: 2

  - name: commit_tracker
    params:
      self_id: __SELF_ID__
      voter_count: 2

  - name: apply_pipeline
  - name: wal
  - name: durability_ledger
    params:
      self_id: __SELF_ID__
      voter_count: 2
      partition_id: 0

  - name: cp_bridge
  - name: cp_proof_cache
  - name: flow_controller
  - name: telemetry_agg
  - name: client_surface

wiring:
  # ── Transport: linux_net ↔ peer_router ─────────────────────
  - from: linux_net.net_out
    to: peer_router.net_in
  - from: peer_router.net_out
    to: linux_net.net_in

  # ── Inbound peer traffic ───────────────────────────────────
  # peer_router demuxes the 5-byte partitioned wire envelope
  # (`[partition_id:u16 LE][msg_type:u8][len:u16 LE]`):
  #   MSG_APPEND_ENTRIES_RESP                           → peer_rx
  #   votes / heartbeats / AppendEntries / snapshot     → raft_rpc
  #   anything else from a peer (untrusted shape)       → drop
  # Non-Raft client traffic (HTTP admin) still routes through
  # `cleartext` → `client_surface`, which dispatches by msg_type.
  - from: peer_router.peer_rx
    to: replicator.ack
  - from: peer_router.raft_rpc
    to: raft_engine.rpc

  # ── Outbound peer traffic ──────────────────────────────────
  - from: raft_engine.rpc_out
    to: peer_router.peer_tx
  - from: replicator.net_out
    to: peer_router.repl_tx

  # ── HTTP admin (clients reach the cluster via either node) ──
  - from: peer_router.cleartext
    to: client_surface.requests
  - from: client_surface.raft_rpc
    to: raft_engine.rpc
  - from: client_surface.client_req
    to: raft_engine.proposals
  - from: client_surface.responses
    to: peer_router.client_resp

  # ── Raft pipeline ──────────────────────────────────────────
  - from: raft_engine.append_entries
    to: replicator.entries
  - from: replicator.match_indices
    to: commit_tracker.match
  - from: replicator.lag_signal
    to: flow_controller.lag
  - from: raft_engine.log_append
    to: wal.entries
  - from: wal.flushed
    to: durability_ledger.ack
  # Spec §10.4.1: every replica tracks its own `local_wal_durable_index`
  # in raft_engine so followers can stamp it into each AE response.
  - from: wal.flushed
    to: raft_engine.wal_flushed
  # Cross-node DurabilityAck fan-in (spec §10.4.1). Followers' durable
  # indices arrive embedded in AE responses; replicator synthesizes
  # MSG_FSYNC_ACK frames keyed by the follower's replica id so the
  # leader's durability_ledger can compute quorum-fsync.
  - from: replicator.cross_durability_ack
    to: durability_ledger.ack
  # Conflict-repair retry: replicator asks wal for a specific log
  # index, wal replies with the entry body so the replicator can
  # build a targeted AE for a lagging follower. See RFC §1.1.
  - from: replicator.wal_request
    to: wal.entry_request
  - from: wal.entry_reply
    to: replicator.wal_reply
  - from: durability_ledger.quorum_durable
    to: commit_tracker.durable
  - from: commit_tracker.committed
    to: apply_pipeline.entries
  - from: commit_tracker.committed
    to: raft_engine.commit
  - from: raft_engine.commit_advanced
    to: apply_pipeline.entries
  - from: raft_engine.log_observe
    to: apply_pipeline.log_entries

  # ── Control plane ──────────────────────────────────────────
  - from: cp_bridge.proof
    to: cp_proof_cache.proof
  - from: cp_proof_cache.cache_state
    to: commit_tracker.cp_state
  - from: cp_proof_cache.strict_fallback
    to: raft_engine.fallback_signal

  # ── Metrics ────────────────────────────────────────────────
  - from: raft_engine.metrics
    to: telemetry_agg.ingest
  - from: wal.metrics
    to: telemetry_agg.ingest
  - from: replicator.metrics
    to: telemetry_agg.ingest
  - from: telemetry_agg.readyz
    to: client_surface.readyz_data
  - from: telemetry_agg.export
    to: client_surface.metrics_data
