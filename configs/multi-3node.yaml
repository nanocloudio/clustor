# Clustor — 3-replica single-partition test cluster (template).
#
# DEV/TEST ONLY. The `http_adapter.admin_request → admin_handler.requests`
# edge near the end of this file routes `POST /admin/<op>` straight
# into admin_handler without going through `rbac`. Don't deploy this
# config to anywhere the HTTP port isn't already behind an
# authenticated proxy. Routing HTTP admin through rbac is tracked at
# docs/native_fluxor.md.
#
# This file is a TEMPLATE: it contains `__SELF_ID__`,
# `__LISTEN_PORT__`, and `__PEER{0,1,2}_PORT__` placeholders that
# must be substituted per node before `fluxor run`. Render with:
#
#   fluxor up configs/multi-3node.yaml --replicas 3          # spawn all
#   fluxor render-template configs/multi-3node.yaml \
#       --var SELF_ID=0 --var LISTEN_PORT=9090 \
#       --var PEER0_PORT=9090 --var PEER1_PORT=9091 --var PEER2_PORT=9092 \
#       --var HTTP_PORT=19090 > /tmp/n0.yaml                  # one node
#
# Three replicas on localhost. voter_count=3 means majority=2, so
# the cluster survives one node failure. With two of three down,
# no progress is possible — that's the canonical Raft availability
# guarantee the topology exists to verify.
#
# This is the same shape as `multi-2node.yaml` but with peer_count
# raised to 3 and a `peer2_port` knob. The cluster harness at
# `tests/support/cluster.rs` uses this template for all 3-replica
# scenarios so each test exercises a real multi-node graph (not
# three independent single-node processes).

target: linux
tick_us: 1000

# Accept structural cycles. The clustor graph has a metrics fanout
# `raft_engine → telemetry_agg → client_surface → raft_engine.rpc`
# which is a topological cycle but a semantic feedback edge — each
# step is single-pass and never re-enters the cycle within one tick.
scheduler:
  accept_cycles: true

platform:
  net: {}

modules:
  - name: peer_router
    params:
      self_id: __SELF_ID__
      peer_count: 3
      listen_port: __LISTEN_PORT__
      peer0_port: __PEER0_PORT__
      peer1_port: __PEER1_PORT__
      peer2_port: __PEER2_PORT__

  - name: client_codec
    params:
      self_id: __SELF_ID__
  - name: throttle_gate

  - name: raft_engine
    params:
      self_id: __SELF_ID__
      voter_count: 3
      heartbeat_interval_ms: 150

  - name: replicator
    params:
      self_id: __SELF_ID__
      peer_count: 3

  - name: commit_tracker
    params:
      self_id: __SELF_ID__
      voter_count: 3

  - name: apply_pipeline
  - name: wal
  - name: durability_ledger
    params:
      self_id: __SELF_ID__
      voter_count: 3
      partition_id: 0

  - name: cp_bridge
  - name: cp_proof_cache
  - name: read_gate
  - name: flow_controller
  - name: key_manager
  - name: telemetry_agg
  - name: client_surface
  - name: rbac
  - name: admin_handler
  - name: snapshot_engine
  - name: placement_router

  # Diagnostic HTTP surface — see `configs/single.yaml`. Shares
  # the platform-injected `linux_net` with `peer_router`.
  - name: http_adapter
  - name: http_ingress
    params:
      listen_port: __HTTP_PORT__

wiring:
  # ── Transport: linux_net ↔ peer_router ─────────────────────
  - from: linux_net.net_out
    to: peer_router.net_in
  - from: peer_router.net_out
    to: linux_net.net_in

  # ── Inbound peer traffic ───────────────────────────────────
  # peer_router demuxes the 5-byte partitioned wire envelope
  # (`[partition_id:u16 LE][msg_type:u8][len:u16 LE]`):
  #   MSG_APPEND_ENTRIES_RESP                          → peer_rx
  #   votes / heartbeats / AppendEntries / snapshot    → raft_rpc
  # Non-Raft client traffic still routes through `cleartext` →
  # `client_surface`. `client_surface.raft_rpc` is intentionally
  # unwired here to avoid the fan-in collision documented in
  # `multi-2node-2p.yaml`.
  - from: peer_router.peer_rx
    to: replicator.ack
  - from: peer_router.raft_rpc
    to: raft_engine.rpc

  # ── Outbound peer traffic ──────────────────────────────────
  - from: raft_engine.rpc_out
    to: peer_router.peer_tx
  - from: replicator.net_out
    to: peer_router.repl_tx

  # ── HTTP/client routing ────────────────────────────────────
  - from: peer_router.cleartext
    to: client_surface.requests
  - from: client_surface.client_req
    to: client_codec.raw
  - from: client_surface.admin_req
    to: rbac.request
  - from: client_surface.responses
    to: peer_router.client_resp

  # ── Client pipeline ────────────────────────────────────────
  - from: client_codec.parsed
    to: throttle_gate.requests
  - from: throttle_gate.admitted
    to: raft_engine.proposals_tagged
  # Correlation feedback so client_codec can map (correlation_id → wal_index).
  - from: raft_engine.proposal_assigned
    to: client_codec.proposal_assigned
  - from: raft_engine.leader_state
    to: client_codec.leader_state
  - from: throttle_gate.rejected
    to: client_codec.responses

  # ── Flow control ───────────────────────────────────────────
  - from: flow_controller.credits
    to: throttle_gate.credit_supply
  - from: flow_controller.envelope
    to: client_surface.throttle_status

  # ── Raft replication ───────────────────────────────────────
  - from: raft_engine.append_entries
    to: replicator.entries
  - from: replicator.match_indices
    to: commit_tracker.match
  - from: replicator.lag_signal
    to: flow_controller.lag

  # ── Persistence ────────────────────────────────────────────
  - from: raft_engine.log_append
    to: wal.entries
  - from: wal.flushed
    to: durability_ledger.ack
  # Spec §10.4.1: every replica tracks its own `local_wal_durable_index`
  # in raft_engine so followers can stamp it into each AE response.
  - from: wal.flushed
    to: raft_engine.wal_flushed
  # Cross-node DurabilityAck fan-in (spec §10.4.1). The leader's
  # durability_ledger composes per-replica progress from local
  # wal.flushed AND this synthesized stream of follower fsync acks
  # extracted from AppendEntriesResponse envelopes — without this
  # edge, multi-node clusters can't compute quorum-fsync and commit
  # under DUR_GROUP_FSYNC stalls indefinitely.
  - from: replicator.cross_durability_ack
    to: durability_ledger.ack
  - from: replicator.wal_request
    to: wal.entry_request
  - from: wal.entry_reply
    to: replicator.wal_reply
  - from: durability_ledger.quorum_durable
    to: commit_tracker.durable

  # ── Commit → apply ─────────────────────────────────────────
  - from: commit_tracker.committed
    to: apply_pipeline.entries
  - from: commit_tracker.committed
    to: raft_engine.commit
  - from: raft_engine.commit_advanced
    to: apply_pipeline.entries
  - from: raft_engine.log_observe
    to: apply_pipeline.log_entries
  - from: client_codec.reads
    to: apply_pipeline.read
  - from: apply_pipeline.applied
    to: client_codec.responses
  - from: client_codec.responses_out
    to: client_surface.client_responses

  # ── Snapshots ──────────────────────────────────────────────
  - from: snapshot_engine.export_chunks
    to: replicator.snapshot_rx
  - from: replicator.snapshot_import
    to: snapshot_engine.import_chunks
  - from: snapshot_engine.manifest_auth
    to: peer_router.peer_tx
  - from: wal.compaction_signal
    to: snapshot_engine.trigger
  - from: snapshot_engine.installed_local
    to: raft_engine.snapshot_installed

  # ── Keys ───────────────────────────────────────────────────
  - from: key_manager.dek_epoch
    to: wal.key_update
  - from: key_manager.dek_epoch
    to: snapshot_engine.key_update

  # ── Control plane ──────────────────────────────────────────
  - from: cp_bridge.proof
    to: cp_proof_cache.proof
  - from: cp_proof_cache.cache_state
    to: read_gate.cache
  - from: cp_proof_cache.cache_state
    to: commit_tracker.cp_state
  - from: cp_proof_cache.strict_fallback
    to: raft_engine.fallback_signal
  - from: read_gate.permits
    to: apply_pipeline.read_permits
  - from: placement_router.routing
    to: client_codec.placement

  # ── Admin ──────────────────────────────────────────────────
  - from: rbac.authorized
    to: admin_handler.requests
  - from: rbac.denied
    to: client_surface.admin_responses
  - from: admin_handler.raft_commands
    to: raft_engine.admin_proposals
  - from: raft_engine.admin_applied
    to: admin_handler.applied
  - from: admin_handler.responses
    to: client_surface.admin_responses
  # Replicable admin ops (FREEZE / THAW / DURABILITY_MODE) ride
  # the client proposal path so every replica applies the entry.
  - from: admin_handler.raft_proposal
    to: raft_engine.proposals

  # ── Telemetry ──────────────────────────────────────────────
  - from: raft_engine.metrics
    to: telemetry_agg.ingest
  - from: replicator.metrics
    to: telemetry_agg.ingest
  - from: wal.metrics
    to: telemetry_agg.ingest
  - from: flow_controller.metrics
    to: telemetry_agg.ingest
  - from: cp_proof_cache.metrics
    to: telemetry_agg.ingest
  - from: snapshot_engine.metrics
    to: telemetry_agg.ingest
  - from: rbac.audit_events
    to: telemetry_agg.ingest
  - from: telemetry_agg.readyz
    to: client_surface.readyz_data
  - from: telemetry_agg.why
    to: client_surface.why_data
  - from: telemetry_agg.export
    to: client_surface.metrics_data

  # ── HTTP diagnostic surface ──────────────────────────────────
  - from: linux_net.net_out
    to: http_ingress.net_in
  - from: http_ingress.net_out
    to: linux_net.net_in
  - from: http_ingress.request
    to: http_adapter.request
  - from: http_adapter.response
    to: http_ingress.response
  - from: telemetry_agg.readyz
    to: http_adapter.readyz
  - from: telemetry_agg.why
    to: http_adapter.why
  - from: telemetry_agg.export
    to: http_adapter.metrics
  # POST /admin/<op> → http_adapter.admin_request →
  # admin_handler.requests. DEV/TEST ONLY: this edge BYPASSES
  # rbac entirely (see the file header).
  - from: http_adapter.admin_request
    to: admin_handler.requests
