# Clustor — 2-replica 2-partition test cluster (template).
#
# This file is a TEMPLATE: substitute `__SELF_ID__` and
# `__LISTEN_PORT__` per node before `fluxor run`. Render with:
#
#   fluxor up configs/multi-2node-2p.yaml --replicas 2       # spawn both
#   fluxor render-template configs/multi-2node-2p.yaml \
#       --var SELF_ID=0 --var LISTEN_PORT=9090 \
#       --var PEER0_PORT=9090 --var PEER1_PORT=9091 \
#       --var HTTP_PORT=19090 > /tmp/n0.yaml                  # one node
#
# Validates that per-partition Raft state machines run independently
# across two replicas. Both replicas run on localhost; per-partition
# voter_count is 2, so each partition independently elects a leader,
# replicates AppendEntries, and only commits when both replicas
# durably persist.
#
# Per-partition WAL paths:
#   partition 0 → wal/seg_*       (legacy flat path; pid=0 keeps it)
#   partition 1 → wal/p0001/seg_* (multi-Raft path)
#
# peer_router demuxes the 5-byte partitioned wire envelope:
#   APPEND_ENTRIES_RESP                  → peer_rx → replicator_pN
#   votes / heartbeats / AE / snapshot   → raft_rpc → raft_engine_pN
#   non-Raft (HTTP admin)                → cleartext → client_surface
# Each per-partition consumer filters by partition_id, so a frame
# for p0 cannot be applied to p1's state. Run from per-node working
# directories so `wal/` and `raft/` don't collide.

target: linux
tick_us: 1000

# Cyclic feedback edges (e.g. cp_proof_cache → commit_tracker.cp_state
# → raft_engine.commit → … back into the cp loop) are intentional —
# they're how the substrate converges in one tick. Tell fluxor not
# to reject the graph for these structural cycles.
scheduler:
  accept_cycles: true

platform:
  net: {}

modules:
  - name: peer_router
    params:
      self_id: __SELF_ID__
      peer_count: 2
      listen_port: __LISTEN_PORT__
      peer0_port: __PEER0_PORT__
      peer1_port: __PEER1_PORT__

  # Hash-route incoming MSG_CLIENT_PROPOSAL by body.
  - name: client_codec
    params:
      self_id: __SELF_ID__
  - name: throttle_gate
  - name: partition_router
    params:
      num_partitions: 2

  # ── Partition 0 ───────────────────────────────────────────
  - name: raft_engine_p0
    type: raft_engine
    params:
      self_id: __SELF_ID__
      voter_count: 2
      heartbeat_interval_ms: 150
      partition_id: 0

  - name: replicator_p0
    type: replicator
    params:
      self_id: __SELF_ID__
      peer_count: 2
      partition_id: 0

  - name: wal_p0
    type: wal
    params:
      partition_id: 0
  - name: durability_ledger_p0
    type: durability_ledger
    params:
      self_id: __SELF_ID__
      voter_count: 2
      partition_id: 0
  - name: commit_tracker_p0
    type: commit_tracker
    params:
      self_id: __SELF_ID__
      voter_count: 2
  - name: apply_pipeline_p0
    type: apply_pipeline
    params:
      partition_id: 0

  # ── Partition 1 ───────────────────────────────────────────
  - name: raft_engine_p1
    type: raft_engine
    params:
      self_id: __SELF_ID__
      voter_count: 2
      heartbeat_interval_ms: 150
      partition_id: 1

  - name: replicator_p1
    type: replicator
    params:
      self_id: __SELF_ID__
      peer_count: 2
      partition_id: 1

  - name: wal_p1
    type: wal
    params:
      partition_id: 1
  - name: durability_ledger_p1
    type: durability_ledger
    params:
      self_id: __SELF_ID__
      voter_count: 2
      partition_id: 1
  - name: commit_tracker_p1
    type: commit_tracker
    params:
      self_id: __SELF_ID__
      voter_count: 2
  - name: apply_pipeline_p1
    type: apply_pipeline
    params:
      partition_id: 1

  # ── Shared substrate ──────────────────────────────────────
  - name: cp_bridge
  - name: cp_proof_cache
  - name: flow_controller
  - name: telemetry_agg
  - name: client_surface

wiring:
  # ── Transport ─────────────────────────────────────────────
  - from: linux_net.net_out
    to: peer_router.net_in
  - from: peer_router.net_out
    to: linux_net.net_in

  # ── Inbound peer demux ────────────────────────────────────
  - from: peer_router.peer_rx
    to: replicator_p0.ack
  - from: peer_router.peer_rx
    to: replicator_p1.ack
  - from: peer_router.raft_rpc
    to: raft_engine_p0.rpc
  - from: peer_router.raft_rpc
    to: raft_engine_p1.rpc

  # ── Outbound to peer ──────────────────────────────────────
  - from: raft_engine_p0.rpc_out
    to: peer_router.peer_tx
  - from: raft_engine_p1.rpc_out
    to: peer_router.peer_tx
  - from: replicator_p0.net_out
    to: peer_router.repl_tx
  - from: replicator_p1.net_out
    to: peer_router.repl_tx

  # ── HTTP / client proposals ──────────────────────────────
  - from: peer_router.cleartext
    to: client_surface.requests
  # client_surface.raft_rpc is intentionally unwired here: peer_router
  # already delivers all peer Raft RPCs to raft_engine_pN.rpc via
  # the partition-aware demux, and adding client_surface.raft_rpc would
  # create a fan-in/fan-out collision at p0.rpc (a tee from
  # peer_router fanning into a merge that also takes client_surface)
  # which fluxor's automatic fan insertion can't resolve cleanly.
  # HTTP-injected Raft RPCs are not part of this test path.
  - from: client_surface.responses
    to: peer_router.client_resp

  # Route client proposals through the canonical facade path:
  # client_surface → client_codec → throttle_gate → partition_router.
  - from: client_surface.client_req
    to: client_codec.raw
  - from: client_codec.parsed
    to: throttle_gate.requests
  - from: throttle_gate.rejected
    to: client_codec.responses
  - from: throttle_gate.admitted
    to: partition_router.proposals_tagged
  - from: partition_router.proposals_tagged_p0
    to: raft_engine_p0.proposals_partitioned_tagged
  - from: partition_router.proposals_tagged_p1
    to: raft_engine_p1.proposals_partitioned_tagged
  - from: raft_engine_p0.proposal_assigned
    to: client_codec.proposal_assigned
  - from: raft_engine_p1.proposal_assigned
    to: client_codec.proposal_assigned
  - from: client_codec.responses_out
    to: client_surface.client_responses

  # ── Per-partition Raft pipeline ──────────────────────────
  - from: raft_engine_p0.append_entries
    to: replicator_p0.entries
  - from: replicator_p0.match_indices
    to: commit_tracker_p0.match
  - from: replicator_p0.lag_signal
    to: flow_controller.lag
  - from: raft_engine_p0.log_append
    to: wal_p0.entries
  - from: wal_p0.flushed
    to: durability_ledger_p0.ack
  - from: wal_p0.flushed
    to: raft_engine_p0.wal_flushed
  - from: replicator_p0.cross_durability_ack
    to: durability_ledger_p0.ack
  - from: durability_ledger_p0.quorum_durable
    to: commit_tracker_p0.durable
  - from: commit_tracker_p0.committed
    to: apply_pipeline_p0.entries
  - from: commit_tracker_p0.committed
    to: raft_engine_p0.commit
  - from: raft_engine_p0.commit_advanced
    to: apply_pipeline_p0.entries
  - from: raft_engine_p0.log_observe
    to: apply_pipeline_p0.log_entries
  - from: apply_pipeline_p0.applied
    to: client_codec.responses

  - from: raft_engine_p1.append_entries
    to: replicator_p1.entries
  - from: replicator_p1.match_indices
    to: commit_tracker_p1.match
  - from: replicator_p1.lag_signal
    to: flow_controller.lag
  - from: raft_engine_p1.log_append
    to: wal_p1.entries
  - from: wal_p1.flushed
    to: durability_ledger_p1.ack
  - from: wal_p1.flushed
    to: raft_engine_p1.wal_flushed
  - from: replicator_p1.cross_durability_ack
    to: durability_ledger_p1.ack
  - from: durability_ledger_p1.quorum_durable
    to: commit_tracker_p1.durable
  - from: commit_tracker_p1.committed
    to: apply_pipeline_p1.entries
  - from: commit_tracker_p1.committed
    to: raft_engine_p1.commit
  - from: raft_engine_p1.commit_advanced
    to: apply_pipeline_p1.entries
  - from: raft_engine_p1.log_observe
    to: apply_pipeline_p1.log_entries
  - from: apply_pipeline_p1.applied
    to: client_codec.responses

  # ── Control plane ─────────────────────────────────────────
  - from: cp_bridge.proof
    to: cp_proof_cache.proof
  - from: cp_proof_cache.cache_state
    to: commit_tracker_p0.cp_state
  - from: cp_proof_cache.cache_state
    to: commit_tracker_p1.cp_state
  - from: cp_proof_cache.strict_fallback
    to: raft_engine_p0.fallback_signal
  - from: cp_proof_cache.strict_fallback
    to: raft_engine_p1.fallback_signal

  # ── Metrics ───────────────────────────────────────────────
  - from: raft_engine_p0.metrics
    to: telemetry_agg.ingest
  - from: raft_engine_p1.metrics
    to: telemetry_agg.ingest
  - from: wal_p0.metrics
    to: telemetry_agg.ingest
  - from: wal_p1.metrics
    to: telemetry_agg.ingest
  - from: replicator_p0.metrics
    to: telemetry_agg.ingest
  - from: replicator_p1.metrics
    to: telemetry_agg.ingest
  - from: telemetry_agg.readyz
    to: client_surface.readyz_data
  - from: telemetry_agg.export
    to: client_surface.metrics_data
