# Pi 5 / CM5 bare-metal twin of `single-throughput.yaml`. Runs on
# the rig (`fluxor rig test --rig pi5-a`).
#
# Observation rides `platform.debug.to: net` — every `dev_log(…)`
# drains as a UDP datagram to port 6666. The pi5-a rig profile's
# `[telemetry.monitor_udp]` captures it (see
# `~/.config/fluxor/labs/default/rigs/pi5-a.toml`).
#
# No filesystem stack on bare-metal yet: wal's FS_OPEN_CREATE
# returns ENODEV and the module degrades to in-memory. Group-fsync
# logic still exercises end-to-end via dev_log markers.
#
# Driver: `tests/hardware/drive-cm5-rig.sh`.

target: cm5
tick_us: 1000

# Same cyclic-graph allowance as `single.yaml` — Raft's
# raft_engine → replicator → peer_router → raft_engine feedback
# converges via end-of-tick fixed point.
scheduler:
  accept_cycles: true

platform:
  net: {}
  debug:
    to: net

modules:
  - name: peer_router
    params:
      self_id: 0
      peer_count: 1
      listen_port: 9090
      peer0_port: 9090
  - name: client_codec
    params:
      self_id: 0
  - name: throttle_gate
  - name: raft_engine
    params:
      self_id: 0
      voter_count: 1
      heartbeat_interval_ms: 150
  - name: replicator
    params:
      self_id: 0
      peer_count: 1
  - name: commit_tracker
    params:
      self_id: 0
      voter_count: 1
  - name: apply_pipeline
  - name: wal
    params:
      fsync_mode: 1
      group_window_ms: 5
      group_max_pending: 4
  - name: durability_ledger
    params:
      self_id: 0
      voter_count: 1
      partition_id: 0
  - name: cp_bridge
  - name: cp_proof_cache
  - name: read_gate
  - name: flow_controller
  - name: key_manager
  - name: telemetry_agg
  - name: client_surface
  - name: rbac
  - name: admin_handler
  - name: snapshot_engine
  - name: placement_router

  # HTTP diagnostic surface so the rig scenario can drive admin
  # POSTs (raft doesn't propose a bootstrap no-op in single-node
  # mode, so without a client surface wal stays idle).
  - name: http_adapter
  - name: http_ingress
    params:
      listen_port: 19090

wiring:
  # ── ip ↔ peer_router (cleartext; no TLS) ─────────────────
  - from: ip.net_out
    to: peer_router.net_in
  - from: peer_router.net_out
    to: ip.net_in

  # ── peer_router → application ────────────────────────────
  - from: peer_router.cleartext
    to: client_surface.requests
  - from: peer_router.peer_rx
    to: replicator.ack
  - from: peer_router.raft_rpc
    to: raft_engine.rpc

  # ── Client path ──────────────────────────────────────────
  - from: client_surface.client_req
    to: client_codec.raw
  - from: client_surface.admin_req
    to: rbac.request
  - from: client_surface.responses
    to: peer_router.client_resp

  - from: client_codec.parsed
    to: throttle_gate.requests
  - from: throttle_gate.admitted
    to: raft_engine.proposals_tagged
  - from: raft_engine.proposal_assigned
    to: client_codec.proposal_assigned
  - from: raft_engine.leader_state
    to: client_codec.leader_state
  - from: throttle_gate.rejected
    to: client_codec.responses

  # ── Flow control ──────────────────────────────────────────
  - from: flow_controller.credits
    to: throttle_gate.credit_supply
  - from: flow_controller.envelope
    to: client_surface.throttle_status

  # ── Raft replication ──────────────────────────────────────
  - from: raft_engine.append_entries
    to: replicator.entries
  - from: replicator.net_out
    to: peer_router.peer_tx
  - from: replicator.match_indices
    to: commit_tracker.match
  - from: replicator.lag_signal
    to: flow_controller.lag
  - from: raft_engine.rpc_out
    to: peer_router.peer_tx

  # ── Persistence ───────────────────────────────────────────
  - from: raft_engine.log_append
    to: wal.entries
  - from: wal.flushed
    to: durability_ledger.ack
  - from: wal.flushed
    to: raft_engine.wal_flushed
  - from: replicator.cross_durability_ack
    to: durability_ledger.ack
  - from: durability_ledger.quorum_durable
    to: commit_tracker.durable

  # ── Commit → apply ────────────────────────────────────────
  - from: commit_tracker.committed
    to: apply_pipeline.entries
  - from: commit_tracker.committed
    to: raft_engine.commit
  - from: raft_engine.commit_advanced
    to: apply_pipeline.entries
  - from: raft_engine.log_observe
    to: apply_pipeline.log_entries
  - from: client_codec.reads
    to: apply_pipeline.read
  - from: apply_pipeline.applied
    to: client_codec.responses
  - from: client_codec.responses_out
    to: client_surface.client_responses

  # ── Snapshots ─────────────────────────────────────────────
  - from: snapshot_engine.export_chunks
    to: replicator.snapshot_rx
  - from: replicator.snapshot_import
    to: snapshot_engine.import_chunks
  - from: snapshot_engine.manifest_auth
    to: peer_router.peer_tx
  - from: wal.compaction_signal
    to: snapshot_engine.trigger
  - from: snapshot_engine.installed_local
    to: raft_engine.snapshot_installed

  # ── Keys ──────────────────────────────────────────────────
  - from: key_manager.dek_epoch
    to: wal.key_update
  - from: key_manager.dek_epoch
    to: snapshot_engine.key_update

  # ── Control plane ─────────────────────────────────────────
  - from: cp_bridge.proof
    to: cp_proof_cache.proof
  - from: cp_proof_cache.cache_state
    to: read_gate.cache
  - from: cp_proof_cache.cache_state
    to: commit_tracker.cp_state
  - from: cp_proof_cache.strict_fallback
    to: raft_engine.fallback_signal
  - from: read_gate.permits
    to: apply_pipeline.read_permits
  - from: placement_router.routing
    to: client_codec.placement

  # ── Admin (wire-level only; no HTTP path on bare-metal) ───
  - from: rbac.authorized
    to: admin_handler.requests
  - from: rbac.denied
    to: client_surface.admin_responses
  - from: admin_handler.raft_commands
    to: raft_engine.admin_proposals
  - from: raft_engine.admin_applied
    to: admin_handler.applied
  - from: admin_handler.responses
    to: client_surface.admin_responses
  - from: admin_handler.raft_proposal
    to: raft_engine.proposals

  # ── Telemetry ─────────────────────────────────────────────
  - from: raft_engine.metrics
    to: telemetry_agg.ingest
  - from: replicator.metrics
    to: telemetry_agg.ingest
  - from: wal.metrics
    to: telemetry_agg.ingest
  - from: flow_controller.metrics
    to: telemetry_agg.ingest
  - from: cp_proof_cache.metrics
    to: telemetry_agg.ingest
  - from: snapshot_engine.metrics
    to: telemetry_agg.ingest
  - from: rbac.audit_events
    to: telemetry_agg.ingest
  - from: telemetry_agg.readyz
    to: client_surface.readyz_data
  - from: telemetry_agg.why
    to: client_surface.why_data
  - from: telemetry_agg.export
    to: client_surface.metrics_data

  # ── HTTP diagnostic listener → admin_handler bypass (DEV/TEST) ──
  # POSTs route around rbac; same caveat as `configs/single.yaml`.
  - from: ip.net_out
    to: http_ingress.net_in
  - from: http_ingress.net_out
    to: ip.net_in
  - from: http_ingress.request
    to: http_adapter.request
  - from: http_adapter.response
    to: http_ingress.response
  - from: telemetry_agg.readyz
    to: http_adapter.readyz
  - from: telemetry_agg.why
    to: http_adapter.why
  - from: telemetry_agg.export
    to: http_adapter.metrics
  - from: http_adapter.admin_request
    to: admin_handler.requests
