# Clustor project config consumed by the `fluxor` CLI. See
# ~/Development/nanocloudio/standards/{ci,fluxor-modules,tests,lints}.md
# for the schema each table belongs to.

[ci]
# Module targets to build in CI phase 3. Clustor is host-only today;
# the cluster harness consumes `bcm2712` `.fmod` artefacts as PIC on
# linux/aarch64. Add `rp2350` / `cm5` here when those backends land.
targets = ["bcm2712"]

[ci.lints]
# The single workspace member (`clustor`) is exempted from the
# `[lints] workspace = true` opt-in audit because cargo doesn't
# allow mixing `lints.workspace = true` with per-lint overrides in
# the same `[lints]` table, and the package's reality (tests +
# benches around an empty `lib_stub.rs`) needs `unwrap_used` /
# `panic` / `print_stdout` relaxed. The package inlines a slightly
# relaxed mirror of `[workspace.lints]` in its own `[lints]` block.
[[ci.lints.exemption]]
crate  = "clustor"
reason = "test/bench-only package; cargo doesn't allow `lints.workspace = true` + per-lint overrides in the same table, so the package inlines a relaxed mirror of [workspace.lints]"

[ci.hygiene]
# Tiers where inline tests are banned. `modules/**` is no_std PIC and
# can't host a std test harness; `src/**` would be too if clustor had
# one (it currently has only `lib_stub.rs`).
forbid_inline_tests = ["modules", "src"]
mode = "strict"
max_inline_lines = 80

# Structured exemptions. Every row carries a `rule` discriminator so
# an inline-tests waiver doesn't accidentally also silence
# `allow-without-reason`. See standards/tests.md §3.

[[ci.hygiene.exemption]]
path   = "modules/sdk/replica_facade.rs"
rule   = "inline-tests"
reason = "dual-target host facade: same file compiles into the no_std module ELF and is pulled into host-side cargo test via #[path]. The #[cfg(test)] block is gated away from the no_std build."

[ci.templates]
dir = "configs"
# Defaults for the template-render gate (CI phase 1.5). These values
# are just enough to make every template render without leftover
# `__KEY__` placeholders — they are *not* the production values used
# when actually launching a node. See `fluxor up` / per-rig profiles
# for runtime substitutions.
vars = { SELF_ID = "0", LISTEN_PORT = "9090", PEER0_PORT = "9090", PEER1_PORT = "9091", PEER2_PORT = "9092", HTTP_PORT = "19090" }

[required]
# Wire-ABI pin enforced by `fluxor ci`'s version-skew phase. Bumps
# only when fluxor's `modules/sdk/wire.rs::ABI_VERSION` changes
# (module headers / channel hints / contract ids break). The
# installed `fluxor` CLI must implement this exact ABI version.
# See standards/fluxor-modules.md §5.
fluxor = { abi = 1 }
